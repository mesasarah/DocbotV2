[tool.ruff]
line-length = 110
target-version = "py312"
exclude = [".venv", "data", "uploads", "logs"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",  # line length handled by formatter/reviewer judgment, not a hard block
    "B008",  # Depends(...) in argument defaults is FastAPI's documented, idiomatic pattern
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]
