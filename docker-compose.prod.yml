services:
  ollama:
    image: ollama/ollama:latest
    container_name: docbot-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - docbot_net
    # No public port here -- only the backend needs to reach Ollama, over
    # the internal Docker network. Nothing outside this stack should.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docbot-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/docbot.db
      - UPLOAD_DIR=./uploads
      - CHROMA_PERSIST_DIR=./data/chroma
      - OLLAMA_BASE_URL=http://ollama:11434
      - CORS_ORIGINS=["https://${DOMAIN}"]
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - docbot_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: docbot-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - docbot_net
    # No public port here either -- Caddy is the only container exposed to
    # the internet. Everything else talks over docbot_net.

  caddy:
    image: caddy:2-alpine
    container_name: docbot-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?Set DOMAIN in your .env file, e.g. DOMAIN=docbot.example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - docbot_net

volumes:
  ollama_models:
  backend_data:
  backend_uploads:
  backend_logs:
  caddy_data:
  caddy_config:

networks:
  docbot_net:
    driver: bridge
